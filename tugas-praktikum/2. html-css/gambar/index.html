<!doctype html>
<html lang="en">
  <head>
    <!-- Meta dasar untuk encoding dan tampilan responsif -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Judul halaman pada tab browser -->
    <title>Gallery Buah-Buahan</title>
    <!-- Menghubungkan file CSS lokal -->
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Container utama gallery -->
    <div class="container">
      <!-- Judul halaman -->
      <h1>Galeri Buah-Buahan</h1>

      <!-- Grid gallery berisi 6 gambar buah -->
      <div class="gallery">
        <!-- Item 1: Buah-buahan aneka -->
        <div class="gallery-item">
          <img
            src="https://asset.kompas.com/crops/K1jAY5yDhzgATIRjGDVrwhoRixI=/12x0:504x328/1200x800/data/photo/2023/05/10/645b49b35af83.png"
            alt="Buah-buahan aneka"
          />
        </div>

        <!-- Item 2: Jeruk nipis -->
        <div class="gallery-item">
          <img
            src="https://www.tanamanmart.com/wp-content/uploads/2020/04/harga-bibit-jeruk-lemon-california1.jpg"
            alt="Jeruk nipis"
          />
        </div>

        <!-- Item 3: Semangka -->
        <div class="gallery-item">
          <img
            src="https://upload.wikimedia.org/wikipedia/commons/d/d4/Watermeloen.jpg"
            alt="Semangka"
          />
        </div>

        <!-- Item 4: Nanas dan buah tropis -->
        <div class="gallery-item">
          <img
            src="https://blog.alfagift.id/wp-content/uploads/2025/03/buah-tropis.webp"
            alt="Nanas dan buah tropis"
          />
        </div>

        <!-- Item 5: Kelapa -->
        <div class="gallery-item">
          <img
            src="https://images.alodokter.com/dk0z4ums3/image/upload/v1764577467/attached_image/8-manfaat-daging-kelapa-muda-yang-sayang-untuk-dilewatkan.jpg"
            alt="Kelapa"
          />
        </div>

        <!-- Item 6: Pisang -->
        <div class="gallery-item">
          <img
            src="https://ovegi.co.id/wp-content/uploads/2020/08/pisang.png"
            alt="Pisang"
          />
        </div>
      </div>
    </div>
  </body>
</html>
